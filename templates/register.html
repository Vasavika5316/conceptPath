<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - ConceptPath</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center p-4">
    
    <div class="bg-white/95 backdrop-blur-sm p-10 rounded-2xl shadow-2xl w-full max-w-md transform transition-all hover:scale-[1.01]">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-gray-800 mb-2">Join ConceptPath</h1>
            <p class="text-gray-500 font-medium">Start building your learning roadmaps.</p>
        </div>

        {% if error %}
            <div class="mb-4 p-3 rounded-lg bg-red-100 border border-red-300 text-red-700 text-sm font-semibold">
            ⚠️ {{ error }}
            </div>
        {% endif %}

        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Choose Username</label>
                <input type="text" name="username" required 
                       class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all shadow-sm">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Create Password</label>
                <input type="password" name="password" required 
                       class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all shadow-sm">
            </div>
            <button type="submit" 
                    class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg transform transition-all active:scale-95">
                Register Account
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-gray-600">
            Already mapping? 
            <a href="{{ url_for('login') }}" class="font-bold text-purple-600 hover:text-purple-500 hover:underline transition-all">Login here</a>
        </p>
    </div>

</body>
</html>
